<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BowMaster Elite | Archery Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      #loading-fallback {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #05070a; color: white; display: flex;
        justify-content: center; align-items: center; z-index: 9999;
        font-family: 'Outfit', sans-serif; transition: opacity 0.5s ease;
      }
      .loader-content { text-align: center; max-width: 80%; }
      .loading-spinner {
        width: 40px; height: 40px; border: 3px solid rgba(0, 210, 255, 0.2);
        border-top: 3px solid #00d2ff; border-radius: 50%;
        margin: 0 auto 20px; animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #error-log { margin-top: 20px; font-size: 12px; color: #ff4444; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 8px; display: none; text-align: left; overflow-x: auto; }
    </style>
    <script>
      // Non-module script to catch errors early
      window.logHistory = [];
      function addLog(msg, type = 'log') {
        console[type](msg);
        window.logHistory.push(`[${new Date().toLocaleTimeString()}] ${msg}`);
      }
      window.onerror = function(msg, url, line, col, error) {
        addLog(`ERROR: ${msg} (${url}:${line}:${col})`, 'error');
        showErrorLog();
        return false;
      };
      // Capture-phase listener for resource errors (404s)
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          addLog('RESOURCE FAILED: ' + (e.target.src || e.target.href), 'error');
          showErrorLog();
        }
      }, true);
      function showErrorLog() {
        var errDiv = document.getElementById('error-log');
        if (errDiv) {
          errDiv.style.display = 'block';
          errDiv.innerText = window.logHistory.join('\n');
        }
      }
      addLog('HTML initialized. Waiting for module load...');
    </script>
    <script type="module" crossorigin src="/Archery-game/assets/index-C_DZdzhu.js"></script>
    <link rel="stylesheet" crossorigin href="/Archery-game/assets/index-BUEf2p9i.css">
  </head>
  <body>
    <div id="loading-fallback">
      <div class="loader-content">
        <div class="loading-spinner"></div>
        <h2 style="margin: 0 0 10px 0; letter-spacing: 2px;">BOWMASTER ELITE</h2>
        <p style="opacity: 0.6; margin: 0;">Building the range...</p>
        <div id="error-log"></div>
        <p style="opacity: 0.3; font-size: 10px; margin-top: 15px;">Build: 2026-03-02 15:26</p>
      </div>
    </div>

    <div id="app">
      <canvas id="gameCanvas"></canvas>
      <div id="ui-layer">
        <header>
          <div class="stat-box glass"><span class="label">SCORE</span><span id="score-val" class="value">0</span></div>
          <div class="title-container"><h1>BOWMASTER<span>ELITE</span></h1></div>
          <div class="stat-box glass"><span class="label">ARROWS</span><div id="arrows-container"></div></div>
        </header>
        <button id="theme-toggle" title="Toggle Theme">🌓</button>
        <canvas id="overlay-canvas"></canvas>
        <div id="celebration-text" class="celebration-text">BULLSEYE!</div>
        <div id="wind-indicator" class="glass"><div class="wind-arrow" id="wind-arrow"></div><span id="wind-speed">0.0 mph</span></div>
        <div id="power-gauge-container"><div id="power-gauge"><div id="power-fill"></div></div><span class="label">POWER</span></div>

        <div id="menu" class="overlay active"><div class="menu-content glass"><h2>READY YOUR BOW</h2><p>Master the wind and become the ultimate marksman.</p><button id="start-btn" class="primary-btn">START GAME</button><div class="controls-hint"><span><kbd>CLICK & DRAG</kbd> to Aim</span><span><kbd>RELEASE</kbd> to Shoot</span></div></div></div>
        <div id="game-over" class="overlay"><div class="menu-content glass"><h2>GAME OVER</h2><div class="final-score"><span class="label">TOTAL SCORE</span><span id="final-score-val">0</span></div><button id="restart-btn" class="primary-btn">PLAY AGAIN</button></div></div>
      </div>
    </div>
  </body>
</html>
