<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BowMaster Elite Reborn</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div id="ui-layer">
            <div id="hud" class="hidden">
                <div class="hud-box glass-panel"><span class="hud-label">SCORE</span> <span id="score-val"
                        class="hud-value">0</span></div>
                <div class="hud-box glass-panel"><span class="hud-label">ARROWS</span> <span id="arrows-val"
                        class="hud-value">10</span></div>
                <div class="hud-box glass-panel"><span class="hud-label">WIND</span> <span id="wind-val"
                        class="hud-value" style="font-size: 1.5rem;">0.0 mph →</span></div>
            </div>

            <!-- Power Gauge -->
            <div id="power-gauge-container" class="hidden">
                <div id="power-gauge">
                    <div id="power-fill"></div>
                </div>
            </div>

            <div id="menu-overlay">
                <div class="menu-card glass-panel">
                    <h1 class="logo">BOWMASTER<br>ELITE</h1>
                    <p class="subtitle">Master the winds. Defeat the traps.<br>Claim your glory.</p>
                    <button id="start-btn" class="btn">START GAME</button>
                </div>
            </div>

            <div id="game-over-overlay" class="hidden">
                <div class="menu-card glass-panel">
                    <h1 class="logo">RANGE CLOSED</h1>
                    <p class="subtitle">Final Score: <span id="final-score-val"
                            style="color:var(--primary); font-weight:900;">0</span></p>
                    <button id="restart-btn" class="btn">PLAY AGAIN</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>
