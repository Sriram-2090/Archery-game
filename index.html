<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BowMaster Elite | Archery Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    
    <!-- Critical Inline CSS (Failsafe) -->
    <style>
        :root { --p: #00d2ff; --bg: #05070a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; }
        #loading-fallback {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999; text-align: center; transition: opacity 0.5s;
        }
        .spinner { width: 50px; height: 50px; border: 4px solid #222; border-top: 4px solid var(--p); border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 20px; }
        @keyframes s { to { transform: rotate(360deg); } }
        
        #f-panel {
            position: fixed; bottom: 10px; right: 10px; width: 280px; max-height: 150px;
            background: rgba(0,0,0,0.9); color: #0f8; font-family: monospace; font-size: 10px;
            padding: 10px; border: 1px solid #444; border-radius: 5px; z-index: 10000;
            overflow-y: auto; pointer-events: none;
        }
        .err { color: #f44; }
    </style>

    
    <!-- External Styles -->
  <script type="module" crossorigin src="./assets/index-DMtqvTjl.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CdfzrlRx.css">
</head>
<body>

    <div id="loading-fallback">
        <div>
            <div class="spinner"></div>
            <h2 style="letter-spacing: 4px;">BOWMASTER ELITE</h2>
            <p id="load-status" style="opacity: 0.5; font-size: 0.8rem;">INITIATING...</p>
        </div>
    </div>

    <div id="app">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <header>
                <div class="stat-box glass"><span class="label">SCORE</span><span id="score-val" class="value">0</span></div>
                <div class="title-container"><h1>BOWMASTER<span>ELITE</span></h1></div>
                <div class="stat-box glass"><span class="label">ARROWS</span><div id="arrows-container"></div></div>
            </header>

            <button id="theme-toggle">🌓</button>
            <canvas id="overlay-canvas"></canvas>
            <div id="celebration-text" class="celebration-text">BULLSEYE!</div>

            <div id="wind-indicator" class="glass">
                <div class="wind-arrow" id="wind-arrow"></div>
                <span id="wind-speed">0.0 mph</span>
            </div>

            <div id="power-gauge-container">
                <div id="power-gauge"><div id="power-fill"></div></div>
                <span class="label">POWER</span>
            </div>

            <div id="menu" class="overlay active">
                <div class="menu-content glass">
                    <h2>READY?</h2>
                    <p>Master the winds and claim your glory.</p>
                    <button id="start-btn" class="primary-btn">START GAME</button>
                    <div class="controls-hint">
                        <span><kbd>CLICK & DRAG</kbd> to Aim</span>
                    </div>
                </div>
            </div>

            <div id="game-over" class="overlay">
                <div class="menu-content glass">
                    <h2>RANGE CLOSED</h2>
                    <div class="final-score"><span class="label">TOTAL SCORE</span><span id="final-score-val">0</span></div>
                    <button id="restart-btn" class="primary-btn">PLAY AGAIN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN MODULE -->
</body>
</html>
